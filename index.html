<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scaleo Production Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#eef3f8;

height:100vh;

overflow:hidden;

}

:root{

--blue:#2158d6;

--green:#22b66b;

--dark:#1e293b;

--light:white;

--shadow:0 15px 40px rgba(0,0,0,.08);

}

.container{

display:flex;

height:100vh;

}

/* Sidebar */

.sidebar{

width:260px;

background:white;

box-shadow:var(--shadow);

padding:25px;

display:flex;

flex-direction:column;

gap:25px;

z-index:2;

}

.logo{

display:flex;

align-items:center;

gap:15px;

}

.logo img{

width:50px;

}

.logo h2{

font-size:24px;

color:var(--dark);

}

.menu{

display:flex;

flex-direction:column;

gap:15px;

margin-top:30px;

}

.menu button{

background:none;

border:none;

padding:15px;

border-radius:14px;

font-size:15px;

text-align:left;

cursor:pointer;

transition:.3s;

}

.menu button:hover{

background:linear-gradient(90deg,var(--blue),var(--green));

color:white;

}

/* MAIN */

.main{

flex:1;

display:flex;

flex-direction:column;

padding:25px;

overflow:auto;

}

/* Header */

.top{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

}

.top h1{

font-size:32px;

color:var(--dark);

}

.progress-global{

background:white;

padding:20px;

border-radius:20px;

box-shadow:var(--shadow);

margin-bottom:20px;

}

.progress-bar{

height:18px;

background:#ddd;

border-radius:50px;

overflow:hidden;

margin-top:10px;

}

.progress-fill{

width:45%;

height:100%;

background:linear-gradient(90deg,var(--blue),var(--green));

transition:.4s;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:2fr 1fr;

gap:20px;

}

/* Clients */

.clients{

background:white;

padding:20px;

border-radius:20px;

box-shadow:var(--shadow);

}

.client{

border:1px solid #eee;

padding:20px;

border-radius:18px;

margin-top:20px;

transition:.3s;

}

.client:hover{

transform:translateY(-5px);

box-shadow:0 15px 30px rgba(0,0,0,.08);

}

.client-title{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:15px;

}

.client h3{

font-size:22px;

color:var(--dark);

}

.small-progress{

height:12px;

background:#ddd;

border-radius:30px;

overflow:hidden;

margin-bottom:20px;

}

.small-fill{

height:100%;

width:60%;

background:linear-gradient(90deg,var(--blue),var(--green));

}

.task{

display:flex;

align-items:center;

gap:12px;

padding:10px 0;

font-size:15px;

}

.task input{

width:20px;

height:20px;

accent-color:#22b66b;

}

.add-btn{

margin-top:15px;

padding:12px;

width:100%;

border:none;

background:linear-gradient(90deg,var(--blue),var(--green));

color:white;

border-radius:14px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

.add-btn:hover{

transform:scale(1.03);

}

/* RIGHT */

.right{

display:flex;

flex-direction:column;

gap:20px;

}

.card{

background:white;

border-radius:20px;

padding:20px;

box-shadow:var(--shadow);

}

textarea{

width:100%;

height:180px;

border:none;

outline:none;

resize:none;

font-size:15px;

}

.note{

margin-top:12px;

padding:12px;

background:#f5f5f5;

border-radius:12px;

}

@media(max-width:1000px){

.sidebar{

display:none;

}

.grid{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">

<img src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Meta-Logo.png">

<h2>Scaleo</h2>

</div>

<div class="menu">

<button>🏠 Dashboard</button>

<button>👥 Clients</button>

<button>📊 Statistics</button>

<button>📝 Notes</button>

<button>⚙ Settings</button>

</div>

</div>

<div class="main">

<div class="top">

<h1>Daily Production</h1>

<h3 id="date"></h3>

</div>

<div class="progress-global">

<h2>Today's Progress</h2>

<div class="progress-bar">

<div class="progress-fill" id="globalProgress"></div>

</div>

</div>

<div class="grid">

<div class="clients">

<h2>Clients</h2>

<div id="clientContainer">

</div>

<button class="add-btn" id="newClient">

+ New Client

</button>

</div>

<div class="right">

<div class="card">

<h2>Reminders</h2>

<textarea id="reminders"
placeholder="Write reminders..."></textarea>

</div>

<div class="card">

<h2>Brain Dump</h2>

<textarea id="brain"
placeholder="Ideas, thoughts..."></textarea>

</div>

</div>

</div>

</div>

</div>

<script>

document.getElementById("date").innerHTML=new Date().toDateString();

</script>

</body>

</html>
