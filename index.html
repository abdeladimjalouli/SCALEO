<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Scaleo Production Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">

            <img
                src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Meta-Logo.png"
                alt="Scaleo Logo">

            <div>
                <h2>Scaleo</h2>
                <small>Production Dashboard</small>
            </div>

        </div>

        <nav class="menu">

            <button class="menu-btn active">
                🏠 Dashboard
            </button>

            <button class="menu-btn">
                👥 Clients
            </button>

            <button class="menu-btn">
                📈 Statistics
            </button>

            <button class="menu-btn">
                📝 Notes
            </button>

            <button class="menu-btn">
                ⚙ Settings
            </button>

        </nav>

    </aside>

    <!-- Main -->

    <main class="main">

        <header class="top">

            <div>

                <h1>Daily Production</h1>

                <p id="welcomeText">
                    Welcome back 👋
                </p>

            </div>

            <div class="top-right">

                <span id="clock"></span>

                <h3 id="date"></h3>

            </div>

        </header>

        <!-- Global Progress -->

        <section class="progress-global">

            <div class="progress-header">

                <h2>Today's Progress</h2>

                <span id="globalPercent">0%</span>

            </div>

            <div class="progress-bar">

                <div
                    class="progress-fill"
                    id="globalProgress">
                </div>

            </div>

        </section>

        <!-- Grid -->

        <section class="grid">

            <!-- Clients -->

            <section class="clients">

                <div class="section-title">

                    <h2>Clients</h2>

                    <button
                        class="add-btn"
                        id="newClient">

                        + New Client

                    </button>

                </div>

                <div id="clientContainer">

                    <!-- Clients generated by JavaScript -->

                </div>

            </section>

            <!-- Right Column -->

            <aside class="right">

                <div class="card">

                    <div class="card-title">

                        <h2>Reminders</h2>

                        <button id="clearReminders">
                            Clear
                        </button>

                    </div>

                    <textarea
                        id="reminders"
                        placeholder="Write reminders..."></textarea>

                </div>

                <div class="card">

                    <div class="card-title">

                        <h2>Brain Dump</h2>

                        <button id="clearBrain">
                            Clear
                        </button>

                    </div>

                    <textarea
                        id="brain"
                        placeholder="Ideas, thoughts, inspiration..."></textarea>

                </div>

                <div class="card stats">

                    <h2>Quick Stats</h2>

                    <div class="stat">

                        <span>Total Clients</span>

                        <strong id="totalClients">0</strong>

                    </div>

                    <div class="stat">

                        <span>Total Tasks</span>

                        <strong id="totalTasks">0</strong>

                    </div>

                    <div class="stat">

                        <span>Completed</span>

                        <strong id="completedTasks">0</strong>

                    </div>

                </div>

            </aside>

        </section>

    </main>

</div>

<!-- Client Template -->

<template id="clientTemplate">

    <div class="client">

        <div class="client-title">

            <input
                type="text"
                class="client-name"
                value="New Client">

            <button class="delete-client">
                ✖
            </button>

        </div>

        <div class="small-progress">

            <div class="small-fill"></div>

        </div>

        <div class="tasks">

            <!-- Tasks -->

        </div>

        <button class="task-btn">
            + Add Task
        </button>

    </div>

</template>

<!-- Task Template -->

<template id="taskTemplate">

    <div class="task">

        <input type="checkbox">

        <input
            type="text"
            class="task-input"
            placeholder="New Task">

        <button class="delete-task">
            🗑
        </button>

    </div>

</template>

<script src="script.js"></script>

</body>
</html>
